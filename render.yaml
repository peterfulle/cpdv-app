# Render Blueprint — Tesorería CPV 2°A 2026
# Crea: 1 Postgres + 1 Web Service (Next.js) + Disco persistente para comprobantes
# Para usarlo: Render Dashboard → New → Blueprint → conectar repo `peterfulle/cpdv-app`

databases:
  - name: cpdv-db
    plan: basic-256mb     # plan pagado: persistente, backups diarios, ~$6/mes
    databaseName: cpdv
    user: cpdv
    region: oregon
    postgresMajorVersion: "16"

services:
  - type: web
    name: cpdv-app
    runtime: node
    plan: starter         # plan pagado: 512MB RAM, sin spin-down, ~$7/mes
    region: oregon
    branch: main
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma db push --accept-data-loss=false && npm run start
    healthCheckPath: /
    autoDeploy: true
    numInstances: 1
    disk:
      name: comprobantes
      mountPath: /opt/render/project/src/public/comprobantes
      sizeGB: 5          # 5GB para crecer holgado, ~$1.25/mes
    envVars:
      - key: NODE_VERSION
        value: 20.11.1
      - key: DATABASE_URL
        fromDatabase:
          name: cpdv-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true     # Render genera y rota un secret seguro
      - key: NEXTAUTH_URL
        sync: false             # se setea manual con la URL pública: https://cpdv-app.onrender.com
      - key: UPLOAD_DIR
        value: public/comprobantes
      - key: MP_PUBLIC_KEY
        sync: false
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: MP_CLIENT_ID
        sync: false
      - key: MP_CLIENT_SECRET
        sync: false
      - key: MP_WEBHOOK_BASE_URL
        sync: false             # ej: https://cpdv-app.onrender.com
