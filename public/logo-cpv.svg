<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <circle cx="200" cy="200" r="200" fill="#2A9393"/>

  <!-- CPV large serif text -->
  <text
    x="200" y="178"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="108"
    font-weight="700"
    fill="white"
    text-anchor="middle"
    letter-spacing="-2"
  >CPV</text>

  <!-- PEÑALOLÉN below CPV -->
  <text
    x="200" y="222"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="30"
    fill="white"
    text-anchor="middle"
    letter-spacing="3"
  >PE&#209;ALOL&#201;N</text>

  <!-- Thin separator line -->
  <line x1="48" y1="244" x2="352" y2="244" stroke="rgba(255,255,255,0.42)" stroke-width="1.2"/>

  <!-- iSP logo mark: "i" smaller bold italic, "SP" larger bold -->
  <text
    x="134" y="310"
    font-family="Arial, Helvetica, sans-serif"
    font-size="30"
    font-weight="700"
    font-style="italic"
    fill="white"
    text-anchor="end"
  >i</text>
  <text
    x="138" y="310"
    font-family="Arial, Helvetica, sans-serif"
    font-size="42"
    font-weight="700"
    fill="white"
    text-anchor="start"
  >SP</text>

  <!-- International Schools Partnership small text -->
  <text x="200" y="278" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="rgba(255,255,255,0.88)" text-anchor="start">International</text>
  <text x="200" y="296" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="rgba(255,255,255,0.88)" text-anchor="start">Schools</text>
  <text x="200" y="314" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="rgba(255,255,255,0.88)" text-anchor="start">Partnership</text>
</svg>
